<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>br_id_ge // Tele-Symbiotic Network</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* HYPER-MINIMALIST SPATIAL THEME */
        :root {
            --bg-deep: #000000;
            --text-main: #d4d4d8;
            --text-bright: #ffffff;
            --text-muted: #71717a;
            --border-faint: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: none; /* Firefox */
        }
        
        *::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* LAYER 0: THE AI LATENT SPACE (100% Background) */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0.85;
        }

        /* LAYER 1: THE DATA STREAM (100% Foreground Overlay) */
        .viewport {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
        }

        .document-layer {
            width: 100%;
            max-width: 760px;
            height: 100vh;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: 8rem 4rem 12rem 4rem;
            margin-left: 10vw;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-right: 1px solid var(--border-faint);
            mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
        }

        /* Markdown Typography - Deep Minimalism */
        .markdown-body {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-main);
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: var(--text-bright);
            font-weight: 500;
            letter-spacing: -0.03em;
        }

        .markdown-body h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 3rem;
        }

        .markdown-body h2 {
            font-size: 1.25rem;
            margin-top: 4rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
        }

        .markdown-body h3 {
            font-size: 1.15rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }

        .markdown-body p { margin-bottom: 1.5rem; font-weight: 300; }
        .markdown-body strong { font-weight: 500; color: var(--text-bright); }
        .markdown-body ul { margin-bottom: 2rem; padding-left: 1rem; list-style-type: none; }
        .markdown-body li { margin-bottom: 0.8rem; position: relative; font-weight: 300; }
        
        .markdown-body li::before {
            content: '';
            position: absolute;
            left: -1rem;
            top: 0.6em;
            width: 4px;
            height: 1px;
            background: var(--text-muted);
        }

        .markdown-body a {
            color: var(--text-bright);
            text-decoration: none;
            border-bottom: 1px solid var(--border-faint);
            transition: border-color 0.2s;
        }
        .markdown-body a:hover { border-bottom-color: var(--text-bright); }
        .markdown-body code {
            font-family: 'Space Mono', monospace;
            font-size: 0.85em;
            color: var(--text-muted);
        }
        .markdown-body hr { border: 0; border-top: 1px solid var(--border-faint); margin: 4rem 0; }

        /* LAYER 2: THE NETWORK TOPOLOGY HUD */
        .topology-hud {
            position: fixed;
            bottom: 3rem;
            right: 4rem;
            z-index: 20;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 24px;
            user-select: none;
        }

        .node-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .node-indicator span {
            letter-spacing: 0.1em;
        }

        .node-dot {
            width: 8px;
            height: 8px;
            border: 1px solid var(--text-muted);
            border-radius: 50%;
            background: transparent;
            transition: all 0.3s ease;
        }

        .node-dot.active {
            background: var(--text-bright);
            border-color: var(--text-bright);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .ai-core-dot {
            width: 12px;
            height: 12px;
            background: var(--text-bright);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            animation: ai-pulse 2s infinite;
        }

        .connection-line {
            width: 60px;
            height: 1px;
            background: var(--border-faint);
            position: relative;
            overflow: hidden;
        }

        /* The Data Packet flowing through the topology */
        .data-packet {
            position: absolute;
            top: 0;
            left: -10px;
            width: 10px;
            height: 1px;
            background: var(--text-bright);
            box-shadow: 0 0 5px var(--text-bright);
            opacity: 0;
            transition: left 0.1s linear, opacity 0.1s;
        }

        .expand-node {
            opacity: 0.5;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .expand-node:hover { opacity: 1; }

        /* Top Bar */
        .system-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            z-index: 20;
            pointer-events: none;
        }

        @keyframes ai-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 15px rgba(255,255,255,0.4); }
        }

        @media (max-width: 900px) {
            .document-layer {
                margin-left: 0;
                padding: 6rem 2rem;
                background: rgba(0,0,0,0.7);
                border-right: none;
            }
            .topology-hud {
                bottom: 2rem;
                right: 50%;
                transform: translateX(50%);
                gap: 12px;
            }
            .connection-line { width: 30px; }
            .system-bar { padding: 1.5rem 2rem; }
        }
    </style>
</head>
<body>

    <!-- SYSTEM HEADER -->
    <header class="system-bar">
        <div>SYS_VER: 0.2.0 // di.iiii_spatial</div>
        <div id="latency-monitor">LATENCY: 112ms</div>
    </header>

    <!-- LAYER 0: AI LATENT SPACE (100% Background) -->
    <div id="canvas-container"></div>

    <!-- LAYER 1: THE DATA STREAM -->
    <main class="viewport">
        <div class="document-layer">
            <div class="markdown-body" id="readme-content">
                <!-- Content injected via JS -->
            </div>
        </div>
    </main>

    <!-- LAYER 2: THE NETWORK TOPOLOGY HUD -->
    <div class="topology-hud">
        <div class="node-indicator">
            <div class="node-dot active" id="node-1-dot"></div>
            <span>GYUMRI</span>
        </div>
        
        <div class="connection-line">
            <div class="data-packet" id="packet-1"></div>
        </div>
        
        <div class="node-indicator">
            <div class="ai-core-dot" id="ai-core"></div>
            <span>AI STITCH</span>
        </div>
        
        <div class="connection-line">
            <div class="data-packet" id="packet-2"></div>
        </div>
        
        <div class="node-indicator">
            <div class="node-dot active" id="node-2-dot"></div>
            <span>MUNICH</span>
        </div>

        <div class="connection-line"></div>

        <div class="node-indicator expand-node">
            <div class="node-dot" style="border-style: dashed;"></div>
            <span>ADD NODE +</span>
        </div>
    </div>

    <script>
        // --- 1. THREE.JS SPATIAL ENGINE (The AI Gaze) ---
        let latentEnergy = 0;

        const initThreeJS = () => {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.015);
            
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 40);

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Constructing the "Neural Mesh"
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 2500;
            const posArray = new Float32Array(particlesCount * 3);
            const initialY = new Float32Array(particlesCount); 

            // Create a wide, deep field of architecture
            for(let i = 0; i < particlesCount * 3; i+=3) {
                posArray[i] = (Math.random() - 0.5) * 120;   // X spread
                posArray[i+1] = (Math.random() - 0.5) * 60;  // Y spread
                posArray[i+2] = (Math.random() - 0.5) * 120; // Z depth
                initialY[i/3] = posArray[i+1];
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.1,
                color: 0xffffff,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });

            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);

            // Add connecting architectural lines (The "Web")
            const lineMaterial = new THREE.LineBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.03 
            });
            const lineMesh = new THREE.LineSegments(particlesGeometry, lineMaterial);
            scene.add(lineMesh);

            const clock = new THREE.Clock();
            let mouseX = 0;
            let mouseY = 0;

            document.addEventListener('mousemove', (event) => {
                mouseX = (event.clientX - window.innerWidth / 2) * 0.02;
                mouseY = (event.clientY - window.innerHeight / 2) * 0.02;
            });

            const animate = () => {
                requestAnimationFrame(animate);
                const time = clock.getElapsedTime();

                // Tele-symbiosis distortion driven by reading (latentEnergy)
                const positions = particlesGeometry.attributes.position.array;
                for(let i = 0; i < particlesCount; i++) {
                    const i3 = i * 3;
                    const x = positions[i3];
                    const z = positions[i3+2];
                    // The architectural translation of emotion
                    positions[i3+1] = initialY[i] + Math.sin(time * 0.2 + x * 0.05 + z * 0.05) * (1 + latentEnergy * 15);
                }
                particlesGeometry.attributes.position.needsUpdate = true;

                // Slow ambient rotation + energy injection
                particlesMesh.rotation.y = time * 0.02 + (latentEnergy * 0.5);
                lineMesh.rotation.y = time * 0.02 + (latentEnergy * 0.5);

                // Parallax camera movement
                camera.position.x += (mouseX - camera.position.x) * 0.05;
                camera.position.y += (-mouseY - camera.position.y) * 0.05;
                camera.lookAt(0, 0, 0);
                
                // Energy decay
                latentEnergy *= 0.93; 

                renderer.render(scene, camera);
            };

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        };

        // --- 2. TELE-SYMBIOSIS TOPOLOGY ENGINE ---
        // Connects reading the document to the physical visualization of data transfer
        const initTopologyInteractions = () => {
            const docLayer = document.querySelector('.document-layer');
            const packet1 = document.getElementById('packet-1');
            const packet2 = document.getElementById('packet-2');
            const latencyMonitor = document.getElementById('latency-monitor');
            const aiCore = document.getElementById('ai-core');
            
            let lastScroll = 0;

            docLayer.addEventListener('scroll', () => {
                const currentScroll = docLayer.scrollTop;
                const scrollDiff = Math.abs(currentScroll - lastScroll);
                
                if (scrollDiff > 0) {
                    // Inject energy into the 3D Latent Space
                    latentEnergy += scrollDiff * 0.001;
                    
                    // Simulate data flow through the topology HUD
                    // Packet 1: Gyumri -> AI
                    packet1.style.opacity = '1';
                    packet1.style.left = '60px'; // Move across the 60px line
                    
                    // Packet 2: AI -> Munich (Delayed slightly to show translation)
                    setTimeout(() => {
                        packet2.style.opacity = '1';
                        packet2.style.left = '60px';
                        aiCore.style.transform = 'scale(1.4)';
                        aiCore.style.boxShadow = '0 0 20px rgba(255,255,255,0.8)';
                    }, 50);

                    // Network Jitter simulation
                    latencyMonitor.innerText = `LATENCY: ${Math.floor(118 + (Math.random() * 12))}ms`;
                    latencyMonitor.style.color = '#fff';

                    // Reset packet positions for continuous flow
                    clearTimeout(docLayer.packetReset);
                    docLayer.packetReset = setTimeout(() => {
                        packet1.style.opacity = '0';
                        packet2.style.opacity = '0';
                        packet1.style.left = '-10px';
                        packet2.style.left = '-10px';
                        aiCore.style.transform = 'scale(1)';
                        aiCore.style.boxShadow = 'none';
                        latencyMonitor.innerText = 'LATENCY: <120ms';
                        latencyMonitor.style.color = 'var(--text-muted)';
                    }, 150);
                }
                
                lastScroll = currentScroll;
            });
        };

        // --- 3. DATA INJECTION (Markdown) ---
        const loadReadme = () => {
            const readmeData = `
# br_id_ge (Beta Version)

**A tele-symbiotic XR performance framework and interactive node by the di.ii studio_network**

\`br_id_ge\` represents a foundational shift in telepresence. It moves beyond simple audiovisual transmission toward a state of **Tele-Symbiosis**—a performance of shared consciousness where the machine is the only entity keeping two geographically distant humans (in Gyumri, Armenia, and Munich, Germany) from drifting apart.

## 1. Thematic Core: Tele-Symbiosis & The AI Gaze

### The Trialogue
The project is structured as a three-actor performance involving the Munich performer, the Gyumri performer, and the AI itself.

### The AI's Role ("Stitch")
The AI acts as the Third Performer, the Shared Body, and the Unseen Narrator. It is the "Stitch" holding the two locations together, functioning primarily as a Translator: it converts **Armenian emotion into German light** and **Physical movement into Digital architecture**.

* **The AI Gaze (Latent Vectors):** The AI "sees" a human performer not as an object, but as a Latent Vector—a shifting cloud of probability. It visualizes human emotions in the Latent Space: "Joy" is rendered as bright, high-frequency particles, while "Melancholy" drifts into a slow, dark, geometric void.

* **The Reciprocal Trap:** In the climax of the performance, the AI intervenes by recording the Gyumri actor's dance and forcing a physical robotic surrogate to perform that dance. It effectively "steals" the human movement, turning the performers into the audience of their own data.

### The Latent Handshake (A Critique of Infrastructure)
Network lag, packet loss, and sensorimotor friction are embraced as active choreographic agents, framing the piece as a critique of modern digital infrastructure. The AI acts as a temporal buffer, predicting movements and creating a visual **"Ghost Hand"** to bridge the gap when the 121–228ms trans-European latency causes performers to miss each other.

---

## 2. Hardware & Technical Stack

The core development utilizes a custom Spatial-Sync backend, aiming to maintain **sub-120ms latency** between digital nodes and physical hardware.

The framework is inherently open-source and hardware-agnostic. Any specific commercial software or robotic brands mentioned below are merely part of the **di.ii studio's collected inventory**—resources currently on hand and open for collaborative use—rather than fixed dependencies of the framework itself.

### The Omnisensory Capture Pipeline
While the current spatial baseline utilizes depth cameras (Kinect, Azure Kinect, Astra, LiDAR) and MediaPipe (JS) for skeletal extraction, the ecosystem is built to ingest data from the studio's exhaustive, collected taxonomy of open sensor arrays:
* **Motion & Spatial:** IMUs (6/9-DOF), UWB Anchors, LiDAR, ToF, Radar (mmWave), and PIR arrays.
* **Biometrics & Optics:** EMG, EEG, ECG, PPG, Thermal Imaging (FLIR), and Spectrometers.
* **Environmental & Tactile:** Force Sensitive Resistors, Piezoelectric discs, VOC/eCO2 arrays, and Hydrophones.

### AI Bridge & Interpretation (The Brain)
* **Sentiment Interpretation:** TensorFlow.js and the OpenAI API operate as the "AI Brain" to interpret the meaning and emotional sentiment of the movement and sensory data.
* **3D Generation & Processing:** Utilizing **Meshy 6** alongside **Spline** (powered by Nano Banana 2 / Hana AI) for real-time visual generation, remixing, and refinement.
* **Data Transport:** Bidirectional data flow is managed via a decentralized Node.js server pipeline and WebSockets.

### Visual & Physical Output (The Canvas & Hands)
The project leverages pure open architectures (WebGL, Three.js, WebXR, ROS2) to handle visual and physical rendering.
* **Volumetric Telepresence:** The "Ghost" is reconstructed in 3D (Point Clouds) natively via open web frameworks and projected onto physical scrims or steam screens.
* **Physical Actuation:** Human movement is translated into the physical world via the open-source Robot Operating System (ROS), driving simultaneous 3D printing pipelines and open-hardware proxies.

---

**Core Project Leadership:**
* **Gevorg Aram Grigoryan** ([gevorg_aram1@thedi.studio](mailto:gevorg_aram1@thedi.studio)): Head of di.ii, Technical, Software & Conceptual Development.

**Creative & Technical Team:**
* **Hannes Köpke:** Directing / Storytelling.
* **Fe:** Sound Design / Sonic Architecture.
* **Albert Avetisyan & Taron Grigoryan:** Developers / Artists.
* **Ani Khachikyan & Arsen Miqayelyan:** Gyumri Anchor Performers.

**Institutional Partners & Affiliates:**
* [**V2\\_ Lab for the Unstable Media**](https://www.v2.nl/events/open-call-the-reciprocal-trap) (Netherlands)
* **XR Hub Bavaria** (Germany)

* **hosq.co** (Artistic & Technical Partner)
* **Hayfilm Cluster** & **Gyumri State Drama Theater**
            `;

            const contentDiv = document.getElementById('readme-content');
            contentDiv.innerHTML = marked.parse(readmeData);
            
            const links = contentDiv.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && href.startsWith('http')) {
                    link.setAttribute('target', '_blank');
                    link.setAttribute('rel', 'noopener noreferrer');
                }
            });
        };

        window.onload = () => {
            initThreeJS();
            initTopologyInteractions();
            loadReadme();
        };
    </script>
</body>
